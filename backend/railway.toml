[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 300"
healthcheckPath = "/health"
healthcheckTimeout = 100

[variables]
PYTHONMALLOC = "malloc"
MALLOC_TRIM_THRESHOLD_ = "100000"
PYTHONUNBUFFERED = "1"
